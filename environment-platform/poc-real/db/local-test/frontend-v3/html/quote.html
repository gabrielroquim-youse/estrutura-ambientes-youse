<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sua cotação · Youse</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #1a1a2e; background: #fafafa; min-height: 100vh; }
.preview-banner { color: #fff; padding: 10px 24px; font-size: 13px; text-align: center; }
.preview-banner.qa { background: linear-gradient(90deg, #10b981, #059669); }
.preview-banner.preview { background: linear-gradient(90deg, #ff6b35, #f7931e); }
.preview-banner code { background: rgba(0,0,0,0.25); padding: 2px 8px; border-radius: 3px; }

header { padding: 20px 48px; background: #fff; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 24px; }
.logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
.logo .se { color: #ff6b35; }
.steps { display: flex; gap: 8px; font-size: 13px; color: #9ca3af; margin-left: auto; }
.steps .step { padding: 4px 12px; border-radius: 12px; background: #f3f4f6; }
.steps .step.active { background: #ff6b35; color: #fff; font-weight: 600; }
.steps .step.done { background: #10b981; color: #fff; }

.container { max-width: 820px; margin: 40px auto; padding: 0 24px; }
.coverages { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 32px; }
.cov { background: #fff; border-radius: 14px; padding: 24px 20px; cursor: pointer; border: 2px solid #e5e7eb; text-align: center; }
.cov:hover { border-color: #ff6b35; }
.cov.selected { border-color: #ff6b35; background: #fff5ed; box-shadow: 0 4px 12px rgba(255,107,53,0.15); }
.cov h4 { font-size: 16px; margin-bottom: 6px; }
.cov .badge { font-size: 11px; color: #ff6b35; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }
.cov .desc { font-size: 12px; color: #6b7280; line-height: 1.5; }

.result-card { background: #fff; border-radius: 16px; padding: 40px 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; text-align: center; }
.calc-loading { color: #6b7280; padding: 40px 0; }
.calc-loading .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid #f3f4f6; border-top-color: #ff6b35; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.price-block { padding: 24px 0; border-bottom: 1px solid #f0f0f0; margin-bottom: 24px; }
.price-block .label { color: #6b7280; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.price-block .price { font-size: 56px; font-weight: 800; color: #1a1a2e; letter-spacing: -2px; line-height: 1; }
.price-block .price small { font-size: 18px; font-weight: 400; color: #6b7280; }
.price-block .annual { color: #6b7280; font-size: 14px; margin-top: 8px; }

.vehicle-info { display: flex; justify-content: space-around; padding: 16px 0; margin-bottom: 24px; font-size: 13px; }
.vehicle-info div { text-align: center; }
.vehicle-info .vl { color: #6b7280; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
.vehicle-info .vv { color: #1a1a2e; font-weight: 600; margin-top: 4px; }

.email-status { background: #ecfdf5; border: 1px solid #10b981; color: #047857; padding: 16px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; display: flex; align-items: center; gap: 12px; text-align: left; }
.email-status.error { background: #fef2f2; border-color: #ef4444; color: #b91c1c; }
.email-status a { color: inherit; font-weight: 700; }

.orchestration { background: #1a1a2e; color: #e5e7eb; border-radius: 12px; padding: 20px 24px; margin-top: 24px; text-align: left; font-family: 'Monaco', monospace; font-size: 12px; line-height: 1.7; }
.orchestration .ot { color: #ff6b35; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; font-size: 11px; margin-bottom: 12px; }
.orchestration .line { display: flex; justify-content: space-between; padding: 4px 0; gap: 12px; border-bottom: 1px solid #2d2d44; }
.orchestration .line:last-child { border-bottom: none; }
.orchestration .preview { color: #ff6b35; }
.orchestration .inherited { color: #6b7280; }
.orchestration .ok { color: #10b981; }

button.cta { width: 100%; background: #ff6b35; color: #fff; padding: 16px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
button.cta:hover { background: #e85d2e; }
button.outline { width: 100%; background: transparent; color: #6b7280; padding: 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; }
button.outline:hover { border-color: #ff6b35; color: #ff6b35; }
</style>
</head>
<body>

<div class="preview-banner" id="banner">carregando...</div>

<header>
    <a href="index.html" style="text-decoration:none;color:inherit" class="logo">you<span class="se">se</span></a>
    <div class="steps">
        <div class="step done">✓ Você</div>
        <div class="step done">✓ Veículo</div>
        <div class="step active">3. Cotação</div>
    </div>
</header>

<div class="container">
    <h2 style="margin-bottom:20px;letter-spacing:-0.5px">Escolha sua cobertura</h2>

    <div class="coverages">
        <div class="cov" data-cov="basico"><div class="badge">Econômico</div><h4>Básico</h4><p class="desc">Terceiros + roubo. Preço mais baixo.</p></div>
        <div class="cov selected" data-cov="completo"><div class="badge">Mais escolhido</div><h4>Completo</h4><p class="desc">Total + carro reserva + assistência 24h.</p></div>
        <div class="cov" data-cov="premium"><div class="badge">Top</div><h4>Premium</h4><p class="desc">Completo + blindagem, acessórios e Mercosul.</p></div>
    </div>

    <div class="result-card" id="result">
        <div class="calc-loading"><div class="spinner"></div><div>Calculando sua cotação...</div></div>
    </div>
</div>

<script src="preview-banner.js"></script>
<script>
preview.load().then(info => {
    const isQa = info.preview_id === 'qa';
    const b = document.getElementById('banner');
    b.className = 'preview-banner ' + (isQa ? 'qa' : 'preview');
    b.innerHTML = isQa
        ? '🟢 QA · email sai do <code>noreply@qa</code>'
        : `🌿 PREVIEW <strong>${info.preview_id}</strong> · email sai de <code>noreply+${info.preview_id}@preview.youse.test</code>`;
});

const lead = JSON.parse(sessionStorage.getItem('lead') || 'null');
const vehicle = JSON.parse(sessionStorage.getItem('vehicle') || 'null');
if (!lead || !vehicle) { alert('Sessão expirou.'); window.location.href = 'lead_info.html'; }

let selectedCoverage = 'completo';
let currentQuote = null;

document.querySelectorAll('.cov').forEach(el => {
    el.addEventListener('click', () => {
        document.querySelectorAll('.cov').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedCoverage = el.dataset.cov;
        calculate();
    });
});

async function calculate() {
    document.getElementById('result').innerHTML = '<div class="calc-loading"><div class="spinner"></div><div>Calculando sua cotação...</div></div>';
    try {
        const r = await fetch('/api/quotes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ lead_id: lead.id, vehicle_id: vehicle.id, coverage_type: selectedCoverage }),
        });
        if (!r.ok) throw new Error(await r.text());
        currentQuote = await r.json();
        render();
    } catch (err) {
        document.getElementById('result').innerHTML = `<div style="color:#b91c1c;padding:20px">Erro: ${err.message}</div>`;
    }
}

function render() {
    const q = currentQuote;
    const monthly = parseFloat(q.quote.monthly_premium).toFixed(2).replace('.', ',');
    const annual = parseFloat(q.quote.annual_premium).toFixed(2).replace('.', ',');
    const orc = q.orchestration;

    const emailHtml = q.notification.status === 'sent'
        ? `<div class="email-status">📧 <div>E-mail enviado para <strong>${q.lead.email}</strong>! Veja em <a href="http://localhost:8025" target="_blank">localhost:8025</a></div></div>`
        : `<div class="email-status error">⚠️ <div>Falha ao enviar email: ${q.notification.error || 'erro desconhecido'}</div></div>`;

    const sourceLabel = src => src === 'preview' ? '<span class="preview">● preview</span>' : '<span class="inherited">○ herdado QA</span>';

    document.getElementById('result').innerHTML = `
        ${emailHtml}
        <div style="color:#6b7280;font-size:13px;text-transform:uppercase;letter-spacing:0.5px">Cotação <strong style="color:#ff6b35">${q.quote.quote_number}</strong></div>
        <div class="price-block">
            <div class="label">Sua cotação ${selectedCoverage}</div>
            <div class="price">R$ ${monthly}<small>/mês</small></div>
            <div class="annual">ou R$ ${annual} à vista</div>
        </div>
        <div class="vehicle-info">
            <div><div class="vl">Veículo</div><div class="vv">${q.vehicle.brand} ${q.vehicle.model}</div></div>
            <div><div class="vl">Ano</div><div class="vv">${q.vehicle.year}</div></div>
            <div><div class="vl">Placa</div><div class="vv">${q.vehicle.license_plate}</div></div>
        </div>

        <div class="orchestration">
            <div class="ot">▼ Orquestração desta cotação</div>
            <div class="line"><span>DB usado</span><span class="ok">${orc.db}</span></div>
            <div class="line"><span>order-service</span>${sourceLabel(orc.order_service.source)}</div>
            <div class="line"><span>pricing-engine</span>${sourceLabel(orc.pricing_engine.source)}</div>
            <div class="line"><span style="opacity:.5">URL</span><span style="opacity:.5;font-size:10px">${orc.pricing_engine.url}</span></div>
            <div class="line"><span>notification-service</span>${sourceLabel(orc.notification_service.source)}</div>
            <div class="line"><span style="opacity:.5">URL</span><span style="opacity:.5;font-size:10px">${orc.notification_service.url}</span></div>
        </div>

        <button class="cta" onclick="alert('Em produção: pagamento + apólice.')">CONTRATAR AGORA</button>
        <button class="outline" onclick="window.location.href='index.html'">Fazer nova cotação</button>
    `;
}

calculate();
</script>
</body>
</html>
