# =============================================================================
# docker-compose.cotacao.yml
#
# POC FOCADA — Slice de cotacao auto (nome + CPF + placa + veiculo)
#
# Simula o cenario REAL da Youse:
#   Branch feature/YOU-123 mexe na tela de Nova Cotacao Auto
#   - CLONA: sales-frontend (HTML/JS) + pricing-engine (calculo)
#   - HERDA do QA: order-service, payment, checkout, notificacao
#
# URLs:
#   http://localhost:3000  → Tela de Nova Cotacao (parte CLONADA)
#   http://localhost:4000  → API REST (pricing-engine clonado)
#   http://localhost:5050  → pgAdmin (comparar QA original vs preview)
# =============================================================================

services:

  postgres-qa-simulado:
    image: postgres:14-alpine
    container_name: poc-qa-simulado
    environment:
      POSTGRES_USER: youse
      POSTGRES_PASSWORD: poc_local_only
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./seed-qa-cotacao.sql:/docker-entrypoint-initdb.d/00-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youse -d monolithic_qa"]
      interval: 2s
      timeout: 3s
      retries: 20

  clone-db-job:
    image: postgres:14-alpine
    container_name: poc-clone-job
    depends_on:
      postgres-qa-simulado:
        condition: service_healthy
    environment:
      PGPASSWORD: poc_local_only
      PG_HOST: postgres-qa-simulado
      PG_USER: youse
      PG_TEMPLATE: monolithic_qa
      PG_PREVIEW: preview_you_123
    volumes:
      - ./clone-db-init.sh:/clone-db-init.sh:ro
    entrypoint: ["sh", "/clone-db-init.sh"]
    restart: "no"

  # PostgREST = simula o pricing-engine clonado (microservico Python/Node real seria)
  api-preview:
    image: postgrest/postgrest:v12.0.2
    container_name: poc-api-preview
    depends_on:
      clone-db-job:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgres://youse:poc_local_only@postgres-qa-simulado:5432/preview_you_123
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: youse
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:4000
    ports:
      - "4000:3000"

  frontend-preview:
    image: nginx:alpine
    container_name: poc-frontend-preview
    depends_on:
      - api-preview
    volumes:
      - ./frontend-cotacao:/usr/share/nginx/html:ro
    ports:
      - "3000:80"

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: poc-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@youse.test
      PGADMIN_DEFAULT_PASSWORD: poc
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    ports:
      - "5050:80"
    depends_on:
      - postgres-qa-simulado
